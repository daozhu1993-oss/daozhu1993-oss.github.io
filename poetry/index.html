    const poems = [
  {
    "title": "01一年里最好的一个傍晚",
    "body": "一一，这是麦子。它比我老\n也比你将要活到的岁数更老\n它在这片地上黄了又割，割了又黄\n数不清多少回，从不为谁停下\n也并不记得，三十年前有个孩子\n也曾这样站着，被一只大手牵着\n那只手如今还在，只是慢慢地\n把力气交给了我的手\n你不会记得今天。你太小了\n小到时间还没有在你身上\n留下任何可供日后辨认的刻度\n但这没关系。遗忘是一种宽恕\n土地深谙此道，它接纳种子\n也接纳那些把种子按进去\n转身进城去谋生的人，一视同仁\n这是你爷爷、你太爷爷走了一辈子的田埂\n他们如今还走，只是比从前慢了\n腰也弯了些，像两株\n在地里站了太多年的麦子，再也直不回去了\n你爷爷牵我那年我比你大不了多少\n那力道我直到今天才读懂\n不是怕我跑丢，是想趁还来得及\n把这条路，从他手里\n放进我手里。如今我牵着你\n用的是同一种力道，一个人\n总要等到自己也成了上游\n才认得出，当年水是从哪个方向\n流到他身上来的\n那口水塘还绿着。绿，是因为\n它换过的水，比我见过的人还多\n我小时候在里头呛过水\n是你爷爷一把将我从泥里拎起来的\n那双手现在老了一些，提不动我了\n却还能稳稳地，端起一碗茶\n我牵你站在塘边\n不许你去够水里那朵云\n有些东西好看是因为它远\n什么该够，什么只配远远看着\n这门手艺我还在学\n你爷爷教了我半辈子，还没教完\n这片樱桃，是我和你爷爷一起种的\n种它那年，你爷爷还不老\n你太爷爷背着手，在田头看我们爷俩刨坑\n变老是一件安静的事，安静得\n像树在长——你低头看不出它动\n一抬眼，已经这么高了\n我把树苗按进土里那年，还没有你\n我没想过有一天，会蹲在这同一片地上\n把它结的果子，喂给一个\n那时还不存在的小人\n今年红得最透的那几颗\n我摘下来，在衣襟上擦干净\n一颗，一颗，放进你嘴里\n你眯起眼睛笑了，嘴角红红的\n含含糊糊地，又要下一颗\n你不知道这树是谁种的\n也不知道种它的人里，有一个\n今天就站在你身后，看着你吃\n你只知道：甜\n这就够了。一一\n你只管觉得甜就好\n太阳要落了。光是金的，麦子也是金的\n一时分不清哪是天，哪是地\n我抱你回家，你睡着了\n沉得像一袋新割的麦\n我们的影子叠在一块儿\n被夕阳拉得很长很长\n一直铺到这片麦田的尽头\n你睡着了，没看见\n没关系，我替你看着了\n我会一直记得\n你这么小，被我抱着\n你爷爷还走得动，就在我前面\n麦子很黄，风很轻\n在一年里最好的一个傍晚\n我们一起回了家\n2026.5.15",
    "date": ""
  },
  {
    "title": "02《你出生那天》",
    "body": "你出生那天，我在产房外面\n来回地走，像一个等判决的人\n走廊的灯很白，白得不像人间\n我数自己的脚步，数到记不清\n你哭了。就一声\n我前面活的那三十几年\n忽然全成了序章\n护士把你抱出来\n那么小，皱巴巴的，谁也不像\n她说，来，抱一下\n我这双手，搬过砖，攥过拳\n签过后来证明毫无意义的合同\n那一刻，却突然不会用力\n重一分，怕你疼\n轻一分，怕你掉\n我在外面数脚步的时候\n你妈妈在里面\n用尽全身的力气，一寸一寸\n把你从她身体里，让出来\n疼了那么久，她醒来第一句话\n不是问自己\n是问：孩子呢，孩子好不好\n说真的，我没想过我会当爸爸\n我以为我这种人\n一辈子顾好自己，就算赢了\n直到你来\n我才知道，我前半辈子攒的那点力气\n原来都是为了\n今天，能稳稳地，接住你\n你回家以后，我落下个毛病\n半夜总要爬起来一次\n把手指放到你鼻子底下\n确认那点气还热着，才敢重新睡\n你妈笑我神经\n可我就是怕——\n怕这么好的东西\n是我做的一个梦\n你出生那天\n我三十来岁，活得像一张白纸\n是你，用\"一一\"这两笔\n世上最简单的两笔\n把我这张白纸\n一笔一笔，写成了——\n父亲\n2025.3.30",
    "date": ""
  },
  {
    "title": "03云海里没有汨罗江",
    "body": "端午这天，我们把车开进了云的内部\n秦岭在身下合拢，像一本读不完的书\n南边的雨和北边的雪在书脊里\n各自为政\n一一一岁多，还不会念《离骚》\n她指着窗外，把云喊成了水\n我没有纠正她\n两千多年前那个跳进水里的人\n此刻大概也分不清\n天上和水里，哪一个更深\n妻子在后座补觉，头发\n散落在安全带上，像艾草\n散落在门楣。这是端午\n我们用睡眠和方向盘\n替掉了雄黄与粽叶\n云海到来的时候是没有声音的\n它不像海，海总急着证明自己\n它更像一群羊\n不慌不忙\n吃掉了所有的悬崖\n我把孩子举过头顶\n让她做这一带海拔最高的人\n她不知道脚下是深渊\n只知道父亲的胳膊还结实\n有人已经替你试过了水的深浅\n你只需要，朝云里伸手\n抓不到，也没关系\n你爸这辈子也没抓住过几朵\n但你记着\n你出生那天起，这世上就有一个男人\n把腰熬断,把脾气退光\n专门站在你和所有摔下去的地方之间\n下山的时候你们睡着了\n我一个人，把这一车的人\n从云里，稳稳地\n开回了人间",
    "date": ""
  },
  {
    "title": "04饱尝一口又一口的春天",
    "body": "下了三天的雨之后，我们决定和土地来一场会面\n四年前的一个决定，终于让日子的灰在今年消散\n那都是过去的事了，如今看去\n时间仿佛都不存在，但果实却是真实存在的\n我确定的是，这片土地现在长满了麦子，和樱桃\n五月，小麦亮出呦呦绿色，关闭春天，向夏天迈步\n我站在麦田中间，与梦想遥遥相望\n风从四面八方，吹进怀里\n麦子直立或弯曲，对于风的到来，无喜无悲\n雨水浇灌后的樱桃红了，裂开了口子笑着\n把一颗樱桃吞在嘴里，它的甜，仿佛让我吞下整个春天\n葡萄结成果实只是为了一醉，那樱桃呢？\n也许是为了在夏天与你好好相遇\n父亲用几年的时光拾荒这片土地\n母亲用她的细心让作物生长\n我想，只要万物生光辉\n就能不负这一年年的轮回\n一粒麦子冒芽，抽穗，结谷，收割\n一株樱桃树开花，凋零，结果，成熟\n这些只是看着就很馋了\n更何况饱尝一口又一口春天\n2024.5.4",
    "date": ""
  },
  {
    "title": "05《日轮》",
    "body": "太阳今天不打算好好落下去\n它烧起来了\n把半边天都点着\n光泼在秦岭背上\n也泼在我们回家的路上\n宝宝在安全座椅里坐直了\n她第一次看见这么大的红东西\n挂在天上，不叫，不动\n只是燃烧\n她伸出手\n说：给、给\n车往老家开，太阳往大地里落\n落日把路铺成了金色\n铺过麦地，铺过村庄\n一直铺到家门口\n日轮沉下去的时候\n没有一点声音\n它把最后的光全给了这辆车\n给了安全座椅里\n咯咯笑的小人\n后视镜里\n她笑一下\n天就暗一点\n她再笑一下\n星星就出来一颗",
    "date": "2026.7.4"
  },
  {
    "title": "06你和我",
    "body": "我们吵架，像两股交织的风\n从腾格里沙漠扎进河西走廊\n沙粒摩擦着沙粒，随后\n在一场突如其来的雨中平息\n你把甘肃的云，缝进我陕西的衣襟\n我们的家当塞满后备箱\n摇摇晃晃，装着整个西北的方言\n和一对容易争吵又极易和解的指南针\n当喀纳斯的湖水还映着\n我们昨夜拌嘴的尾音\n天山脚下的风\n已把消息传遍牧场\n一一孕育在夏天旅途中\n你把最洁白的雪山\n和无边的戈壁\n一并指给孩子看\n这就是你的产房\n没有围墙\n那些争吵的冰碛\n终被额尔齐斯河\n揉成温顺的滩涂\n从此我们互为\n永远在建的遗址公园\n随时开放，随处\n可以拥抱",
    "date": "2026.5.17"
  },
  {

        if (onItem) onItem.classList.remove('on');
        const curItem = elTocList.querySelector('.toc-item[data-index="' + i + '"]');
        if (curItem) curItem.classList.add('on');
        elFrame.scrollTop = 0;
        requestAnimationFrame(() => {
          const overflow = elFrame.scrollHeight > elFrame.clientHeight + 4;
          elFrame.classList.toggle('faded', overflow);
        });
        elPoem.classList.remove('fade');
      }, 210);
    }
    function go(d) {
      cur = (cur + d + poems.length) % poems.length;
      render(cur);
    }
    document.getElementById('prev').addEventListener('click', () => go(-1));
    document.getElementById('next').addEventListener('click', () => go(1));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') go(-1);
      else if (e.key === 'ArrowRight') go(1);
    });
    let sx = 0;
    document.addEventListener('touchstart', (e) => { sx = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    });
    // Table of contents drawer
    const elTocList = document.getElementById('tocList');
    const elTocSearch = document.getElementById('tocSearch');
    const elTocPanel = document.getElementById('tocPanel');
    const elTocOverlay = document.getElementById('tocOverlay');
    const elTocBtn = document.getElementById('tocBtn');
    const elTocClose = document.getElementById('tocClose');

    function buildToc(filter) {
      const q = (filter || '').trim().toLowerCase();
      elTocList.innerHTML = '';
      poems.forEach((p, i) => {
        if (q && !p.title.toLowerCase().includes(q)) return;
        const item = document.createElement('button');
        item.className = 'toc-item' + (i === cur ? ' on' : '');
        item.textContent = p.title;
        item.dataset.index = i;
        item.addEventListener('click', () => {
          closeToc();
          cur = i;
          render(cur);
        });
        elTocList.appendChild(item);
      });
    }
    function openToc() {
      buildToc(elTocSearch.value);
      elTocPanel.classList.add('open');
      elTocOverlay.classList.add('show');
      elTocPanel.setAttribute('aria-hidden', 'false');
      elTocSearch.focus();
    }
    function closeToc() {
      elTocPanel.classList.remove('open');
      elTocOverlay.classList.remove('show');
      elTocPanel.setAttribute('aria-hidden', 'true');
    }
    elTocBtn.addEventListener('click', openToc);
    elTocClose.addEventListener('click', closeToc);
    elTocOverlay.addEventListener('click', closeToc);
    elTocSearch.addEventListener('input', () => buildToc(elTocSearch.value));
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeToc(); });

    render(0);
  </script>
  <script>
    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a[href="../index.html"]');
      if (a) { try { sessionStorage.setItem('daoFromSub', '1'); } catch (_) {} }
    });
  </script>
</body>
</html>
